name: test_flutter_template
description: "Empty Flutter template with Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  built_value: ^8.12.1
  chopper: ^8.4.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  intl: any
  logging: ^1.3.0
  shared_preferences: ^2.5.3
  built_collection: ^5.1.1
  google_fonts: ^6.3.2
  package_info_plus: ^9.0.0
  freezed_annotation: ^3.1.0
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: 2.7.1
  chopper_generator: ^8.4.0
  built_value_generator: ^8.12.1
  source_gen: 4.1.1
  freezed: ^3.2.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
        - asset: assets/fonts/Cairo-SemiBold.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
